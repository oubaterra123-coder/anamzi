<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Tool Pro</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0b3d2e,#25D366);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:16px;
    width:340px;
    text-align:center;
    color:white;
    backdrop-filter:blur(10px);
}

input,select{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#25D366;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#qrcode{
    margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h2>WhatsApp Tool 🚀</h2>

<!-- Country -->
<select id="country">
    <option value="212">🇲🇦 Morocco (+212)</option>
    <option value="213">🇩🇿 Algeria (+213)</option>
    <option value="216">🇹🇳 Tunisia (+216)</option>
    <option value="20">🇪🇬 Egypt (+20)</option>

    <option value="1">🇺🇸 USA (+1)</option>
    <option value="44">🇬🇧 UK (+44)</option>
    <option value="33">🇫🇷 France (+33)</option>
    <option value="34">🇪🇸 Spain (+34)</option>
    <option value="49">🇩🇪 Germany (+49)</option>
    <option value="39">🇮🇹 Italy (+39)</option>

    <option value="90">🇹🇷 Turkey (+90)</option>
    <option value="971">🇦🇪 UAE (+971)</option>
    <option value="966">🇸🇦 Saudi Arabia (+966)</option>
    <option value="91">🇮🇳 India (+91)</option>
    <option value="86">🇨🇳 China (+86)</option>

    <option value="81">🇯🇵 Japan (+81)</option>
    <option value="82">🇰🇷 South Korea (+82)</option>
    <option value="55">🇧🇷 Brazil (+55)</option>
    <option value="7">🇷🇺 Russia (+7)</option>
</select>

<input id="num" placeholder="Phone number">

<button onclick="generate()">Generate Link 🚀</button>

<p id="result"></p>

<div id="qrcode"></div>

<button onclick="copyLink()" style="background:#128C7E;">
Copy Link 📋
</button>

<div id="toast" style="
margin-top:10px;
font-size:12px;
opacity:0;
transition:0.3s;
"></div>

</div>

<script>
let currentLink = "";

function generate(){
    let country = document.getElementById("country").value;
    let num = document.getElementById("num").value.trim();

    if(!num){
        document.getElementById("result").innerText = "Enter number";
        return;
    }

    num = num.replace(/\D/g,''); // clean number

    currentLink = "https://wa.me/" + country + num;

    document.getElementById("result").innerHTML =
        `<a href="${currentLink}" target="_blank">${currentLink}</a>`;

    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), currentLink);
}

function copyLink(){
    if(!currentLink){
        showToast("Generate link first");
        return;
    }

    navigator.clipboard.writeText(currentLink);
    showToast("Copied to clipboard!");
}

function showToast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.style.opacity = "1";

    setTimeout(()=>{
        t.style.opacity = "0";
    }, 1500);
}
</script>

</body>
</html>
