<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Link Generator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #25D366, #128C7E);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
        font-size: 20px;
        margin-bottom: 20px;
        color: #128C7E;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #25D366;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #128C7E;
    }

    #result {
        margin-top: 15px;
        word-break: break-all;
    }

    a {
        color: #128C7E;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="card">
    <h1>WhatsApp Link Generator 🚀</h1>

    <input type="text" id="phone" placeholder="Enter phone number (212...)">
    <button onclick="generate()">Generate</button>

    <p id="result"></p>
</div>

<script>
function generate() {
    let phone = document.getElementById("phone").value;
    let link = "https://wa.me/" + phone;

    document.getElementById("result").innerHTML =
        `<a href="${link}" target="_blank">${link}</a>`;
}
</script>

</body>
</html>
