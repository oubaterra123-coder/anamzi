<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>WhatsApp Link Generator</title>
	<style>
		body{font-family:Arial,Helvetica,sans-serif;max-width:600px;margin:40px auto;padding:0 20px}
		input{padding:8px;width:70%;margin-right:8px}
		button{padding:8px}
		#result{margin-top:16px;word-break:break-all}
	</style>
</head><script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<body>
	<h1>WhatsApp Link Generator 🚀</h1>
<div style="font-size:12px;opacity:0.7;margin-bottom:10px;text-align:center;">
⚡ Fast • Free • No
</div>

	<input id="num" placeholder="Enter phone number (country code + number, no + or 0)" aria-label="phone number">
	<button onclick="generate()">Generate</button>

	<p id="result"></p>
<div id="qrcode" style="margin-top:15px;display:flex;justify-content:center;"></div>
	<script>
		function generate(){
    let num = document.getElementById("num").value.trim();

    if(!num){
        document.getElementById("result").innerText = "Enter number";
        return;
    }

    let link = "https://wa.me/" + num;

    document.getElementById("result").innerHTML =
        `<a href="${link}" target="_blank">${link}</a>`;

    // QR CODE
    document.getElementById("qrcode").innerHTML = "";

    new QRCode(document.getElementById("qrcode"), link);
}document.getElementById("result").innerHTML = '<a href="'+link+'" target="_blank" rel="noopener">'+link+'</a>';
		}
	</script>
</body>
</html>
